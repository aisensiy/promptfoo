<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>promptfoo</title>
    <meta name="description" content="LLM testing and evaluation" />
    <meta property="og:image" content="https://www.promptfoo.dev/img/thumbnail.png" />
    <script>
      (() => {
        try {
          const savedMode = localStorage.getItem('darkMode');
          const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const resolvedTheme =
            savedMode === 'true' || (savedMode !== 'false' && systemPrefersDark) ? 'dark' : 'light';

          document.documentElement.style.colorScheme = resolvedTheme;

          if (resolvedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch {
          document.documentElement.style.colorScheme = 'light dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
