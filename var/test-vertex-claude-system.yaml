description: "Test Vertex Claude system message handling"

providers:
  - id: vertex:claude-3-5-sonnet-v2@20241022
    config:
      region: us-east5

prompts:
  # Test 1: System message with structured JSON
  - label: "system-message-json"
    raw: |
      [
        {"role": "system", "content": "You are a pirate. Always respond in pirate speak. Keep responses under 20 words."},
        {"role": "user", "content": "What is the weather like today?"}
      ]

  # Test 2: Plain string (no system message)
  - label: "plain-string"
    raw: "Say hello in exactly 5 words."

  # Test 3: User-only structured messages (no system)
  - label: "user-only-json"
    raw: |
      [
        {"role": "user", "content": "What is 2+2? Reply with just the number."}
      ]

tests:
  - vars: {}
