# E2E test for claude-agent-sdk 0.2.63 upgrade
# Tests: basic chat, tool use with working dir, structured output
description: 'Claude Agent SDK 0.2.63 e2e test'

providers:
  # Basic - no tools, temp dir
  - id: anthropic:claude-agent-sdk
    label: basic
    config:
      model: haiku

  # With working dir and read tools
  - id: anthropic:claude-agent-sdk
    label: with-tools
    config:
      model: haiku
      working_dir: ./examples/claude-agent-sdk/working-dir/sample-project

  # Structured output
  - id: anthropic:claude-agent-sdk
    label: structured
    config:
      model: haiku
      output_format:
        type: json_schema
        schema:
          type: object
          properties:
            answer:
              type: string
            confidence:
              type: number
          required: [answer, confidence]

prompts:
  - 'What is 2+2? Answer in one word.'

tests:
  - vars: {}
    assert:
      - type: contains
        value: '4'
