description: 'Simple claude-agent-sdk test'
providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: haiku
      max_turns: 1
      path_to_claude_code_executable: claude
prompts:
  - 'What is 2+2? Reply with just the number.'
tests:
  - vars: {}
    assert:
      - type: contains
        value: '4'
