description: 'Claude Agent SDK 0.2.63 e2e test'

env:
  CLAUDECODE: ''

providers:
  # Basic - no tools, temp dir
  - id: anthropic:claude-agent-sdk
    label: basic-chat
    config:
      model: haiku
      max_turns: 1

  # With working dir and read tools
  - id: anthropic:claude-agent-sdk
    label: with-read-tools
    config:
      model: haiku
      max_turns: 3
      working_dir: ./examples/claude-agent-sdk/working-dir/sample-project

  # Structured output
  - id: anthropic:claude-agent-sdk
    label: structured-output
    config:
      model: haiku
      max_turns: 3
      output_format:
        type: json_schema
        schema:
          type: object
          properties:
            answer:
              type: string
            confidence:
              type: number
          required: [answer, confidence]

prompts:
  - 'What is 2+2? Reply with just the number.'

tests:
  - vars: {}
    assert:
      - type: contains
        value: '4'
