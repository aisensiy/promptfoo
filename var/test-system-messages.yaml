description: "Test system message handling across providers"

providers:
  # Direct Anthropic provider (shares parseMessages with Vertex Claude path)
  - id: anthropic:messages:claude-haiku-4-5-20251001
    label: "anthropic-haiku"

prompts:
  # Test 1: System message with structured JSON
  - label: "with-system"
    raw: |
      [
        {"role": "system", "content": "You are a pirate. Always respond in pirate speak. Keep responses under 15 words."},
        {"role": "user", "content": "What is 2+2?"}
      ]

  # Test 2: Plain string (no system message)
  - label: "plain-string"
    raw: "What is 2+2? Reply with just the number."

  # Test 3: Multi-turn with system
  - label: "multi-turn"
    raw: |
      [
        {"role": "system", "content": "You only respond with numbers. Nothing else."},
        {"role": "user", "content": "What is 2+2?"},
        {"role": "assistant", "content": "4"},
        {"role": "user", "content": "What is 3+3?"}
      ]

tests:
  - vars: {}
    assert:
      - type: not-contains
        value: "error"
