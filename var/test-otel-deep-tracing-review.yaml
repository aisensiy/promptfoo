description: 'Claude Agent SDK deep tracing e2e - PR review with Sonnet 4.6'

tracing:
  enabled: true
  otlp:
    http:
      enabled: true
      port: 4318
      host: '127.0.0.1'

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: sonnet
      max_turns: 3
      deep_tracing: true
      path_to_claude_code_executable: claude
      working_dir: /Users/mdangelo/projects/pf4

prompts:
  - |
    Review the changes on the current git branch (feat/claude-agent-sdk-otel-tracing) compared to main.
    Focus on the changes in src/tracing/otlpReceiver.ts and src/providers/claude-agent-sdk.ts.
    Give a concise code review with any issues or suggestions. Keep it under 500 words.

tests:
  - vars: {}
    assert:
      - type: contains-any
        value:
          - 'trace'
          - 'OTEL'
          - 'otlp'
          - 'log'

evaluateOptions:
  maxConcurrency: 1
