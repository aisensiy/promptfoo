description: 'Claude Agent SDK OTel deep tracing end-to-end test'

tracing:
  enabled: true
  otlp:
    http:
      enabled: true
      port: 4318
      host: '127.0.0.1'

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: haiku
      max_turns: 1
      deep_tracing: true
      path_to_claude_code_executable: claude

prompts:
  - 'What is the capital of France? Reply with just the city name.'

tests:
  - vars: {}
    assert:
      - type: contains
        value: 'Paris'

evaluateOptions:
  maxConcurrency: 1
