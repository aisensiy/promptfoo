# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Red panda forward deployed engineer pixel art variations

prompts:
  - id: concise
    label: Concise
    raw: >-
      Create a retro pixel art style illustration of a cute red panda mascot
      graphic with a transparent background. The red panda is a forward
      deployed engineer. Include the text "World's Best Forward Deployed
      Engineer 2026" and "promptfoo". {{variation}}

  - id: detailed
    label: Detailed
    raw: >-
      Create a retro 16-bit pixel art illustration of a cute red panda
      mascot character who is a forward deployed engineer.

      RED PANDA CHARACTER: Round face with cream and white patches on cheeks
      and forehead. Simple dot eyes. Small black nose. Friendly smile. Dark
      reddish-brown and bright orange fur rendered in chunky pixels. Wearing
      glasses and a hoodie or blazer. Holding or near a laptop with code
      visible on screen.

      TEXT (REQUIRED): "World's Best Forward Deployed Engineer 2026" in a
      bold pixel font. "promptfoo" in a clean pixel font below or near the
      character.

      Retro 16-bit aesthetic, nostalgic and playful. Transparent background.
      {{variation}}

  - id: poster
    label: Poster
    raw: >-
      Design a retro pixel art award graphic for the Promptfoo mascot: a
      cute red panda character who is a forward deployed engineer. The red
      panda has a round face, cream cheek patches, simple dot eyes, a
      friendly smile, and flat orange-brown pixelated fur. The red panda
      should look proud and accomplished. 16-bit retro game aesthetic,
      nostalgic and playful. Prominently display "World's Best Forward
      Deployed Engineer 2026" as a headline and "promptfoo" as a brand
      mark. Transparent background, PNG-ready. {{variation}}

providers:
  - id: openai:image:gpt-image-1.5
    config:
      size: 1024x1024
      quality: medium
      background: transparent
      output_format: png

tests:
  - vars:
      variation: 'Classic 16-bit RPG style, like a character select screen.'
  - vars:
      variation: 'Game Boy Color palette, green-tinted retro handheld aesthetic.'
  - vars:
      variation: 'SNES-era sprite art, vibrant colors, detailed pixel shading.'
  - vars:
      variation: 'Arcade cabinet style, bold neon colors on dark background elements.'
  - vars:
      variation: 'Trophy or award scene, the red panda holding a golden pixel trophy.'
  - vars:
      variation: 'Desk scene with pixel art monitors, keyboard, coffee mug, and deploy button.'
  - vars:
      variation: 'Victory pose pixel art, confetti particles, celebration scene.'
  - vars:
      variation: 'Retro trading card design, stats panel showing deploy count and uptime.'
  - vars:
      variation: 'NES-era limited palette, 8-bit aesthetic, simple and iconic.'
  - vars:
      variation: 'Pixel art badge design, circular emblem with laurel wreath border.'
  - vars:
      variation: 'Side-scrolling platformer style, the red panda jumping over cloud servers.'
  - vars:
      variation: 'Pixel art sticker sheet layout, multiple small poses of the red panda.'
