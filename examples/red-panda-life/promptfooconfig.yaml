# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Red panda doing mundane middle-aged software engineer life tasks

prompts:
  - id: illustrated
    label: Illustrated
    raw: >-
      Create a charming illustrated image of a cute red panda character
      with round face, cream cheek patches, small black nose, and bright
      orange-brown fur. The red panda is wearing glasses and a slightly
      wrinkled button-down shirt. The scene shows the red panda {{activity}}.
      Warm, cozy, slightly humorous tone. Soft natural lighting.
      No text or logos.

  - id: pixel-art
    label: Pixel Art
    raw: >-
      Create a 16-bit pixel art scene of a cute red panda character with
      round face, cream patches, dot eyes, and orange-brown pixelated fur.
      The red panda is wearing glasses and a hoodie. The scene shows the
      red panda {{activity}}. Retro game aesthetic, warm color palette,
      nostalgic and playful. No text or logos.

providers:
  - id: openai:image:gpt-image-1-mini
    label: gpt-image-1-mini (low)
    config:
      size: 1024x1024
      quality: low

  - id: openai:image:gpt-image-1-mini
    label: gpt-image-1-mini (medium)
    config:
      size: 1024x1024
      quality: medium

tests:
  - vars:
      activity: 'staring blankly at a wall of Jira tickets on a monitor while drinking from a giant coffee mug'
  - vars:
      activity: 'falling asleep during a video standup meeting, head slowly drooping toward the keyboard'
  - vars:
      activity: 'pushing a shopping cart through Costco, loading up on bulk snacks and La Croix'
  - vars:
      activity: 'grilling burgers in the backyard on a Sunday afternoon, wearing an apron and flip flops'
  - vars:
      activity: 'sitting in traffic during a morning commute, yawning in the driver seat of a Subaru'
  - vars:
      activity: 'assembling IKEA furniture on the living room floor, surrounded by allen wrenches and extra screws'
  - vars:
      activity: 'mowing the lawn on a hot day, looking tired and slightly sunburned'
  - vars:
      activity: 'doom-scrolling on a phone while sitting on the couch at 11pm'
  - vars:
      activity: 'standing in the kitchen at 2am eating shredded cheese directly from the bag'
  - vars:
      activity: 'debugging a production incident at midnight, surrounded by empty energy drink cans'
  - vars:
      activity: 'attending a kids soccer game on the sidelines, holding a folding chair and a juice box'
  - vars:
      activity: 'trying to fix the home WiFi router, unplugging and replugging cables with a frustrated expression'
  - vars:
      activity: 'napping on the couch with a laptop still open on the stomach, a cat sleeping nearby'
  - vars:
      activity: 'doing laundry, struggling to fold a fitted sheet with a confused expression'
  - vars:
      activity: 'waiting in line at the DMV, holding a ticket number and looking bored'
  - vars:
      activity: 'stretching at a standing desk, back cracking audibly, with a foam roller nearby'
  - vars:
      activity: 'grocery shopping while comparing nutrition labels on two nearly identical cereal boxes'
  - vars:
      activity: 'shoveling snow from the driveway in pajama pants and winter boots, coffee in hand'
  - vars:
      activity: 'sitting in a dentist waiting room, nervously flipping through a magazine from 2019'
  - vars:
      activity: 'watering houseplants with a tiny watering can, most of the plants looking half-dead'
