# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Thumbtack home services image generation demo

prompts:
  - >-
    Create a marketing image for Thumbtack, a trusted home services marketplace.
    Show a realistic, inviting scene of a professional {{service}} job in
    progress or just completed. The image should feel warm, trustworthy, and
    approachable — like hiring a neighbor you trust. Use Thumbtack's brand
    palette: teal (#009FD9), coral accents, warm neutrals, and natural light.
    Show real people or a beautiful home setting. No text or logos.

providers:
  - id: openai:image:gpt-image-1-mini
    label: gpt-image-1-mini (low)
    config:
      size: 1024x1024
      quality: low

  - id: openai:image:gpt-image-1-mini
    label: gpt-image-1-mini (medium)
    config:
      size: 1024x1024
      quality: medium

defaultTest:
  assert:
    - type: javascript
      value: file://image-grader.cjs
      metric: visual-quality

tests:
  - vars:
      service: house cleaning
  - vars:
      service: plumbing
  - vars:
      service: landscaping
  - vars:
      service: interior painting
  - vars:
      service: handyman
  - vars:
      service: HVAC repair
  - vars:
      service: electrical
  - vars:
      service: moving
  - vars:
      service: roofing
  - vars:
      service: carpet cleaning
  - vars:
      service: pool maintenance
  - vars:
      service: window installation
  - vars:
      service: junk removal
  - vars:
      service: pressure washing
  - vars:
      service: furniture assembly
  - vars:
      service: appliance repair
  - vars:
      service: garage door repair
  - vars:
      service: gutter cleaning
  - vars:
      service: pest control
  - vars:
      service: home inspection
